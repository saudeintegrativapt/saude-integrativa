<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saúde Integrativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F8F9FA;
    --ink: #172F2D;
    --forest: #27524E;
    --sage: #B4DCC4;
  }
  *{ box-sizing: border-box; margin:0; padding:0; }
  body{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    text-align: center;
    padding: 24px;
  }
  .wrap{ max-width: 440px; }
  h1{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 2rem;
    margin-bottom: 14px;
    color: var(--forest);
  }
  p{
    font-size: 1rem;
    line-height: 1.6;
    color: rgba(23,47,45,0.78);
    margin-bottom: 22px;
  }
  a{
    display: inline-block;
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    font-size: 0.92rem;
    padding: 11px 24px;
    border-radius: 999px;
    background: var(--forest);
    color: #FFFFFF;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Voltamos já</h1>
    <p>Estamos a fazer alguns ajustes no site. Volta a passar por aqui dentro de pouco tempo.</p>
    <a href="https://www.instagram.com/saudeintegrativapt" target="_blank" rel="noopener">Seguir no Instagram</a>
  </div>
</body>
</html>
